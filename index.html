<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scratch クラウド変数履歴ビューア</title>
<style>
  :root {
    --bg: #1a1a2e;
    --panel: #22243a;
    --accent: #4cc9f0;
    --accent2: #f72585;
    --text: #eaeaea;
    --sub: #9a9ac0;
    --border: #33344f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.4rem;
    margin-bottom: 4px;
    color: var(--accent);
  }
  .desc {
    color: var(--sub);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    background: var(--panel);
    padding: 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .controls label {
    font-size: 0.8rem;
    color: var(--sub);
    display: block;
    margin-bottom: 4px;
  }
  .field { flex: 1 1 140px; }
  input {
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #11121f;
    color: var(--text);
    font-size: 0.9rem;
  }
  input:focus { outline: 1px solid var(--accent); }
  button {
    align-self: flex-end;
    padding: 9px 20px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #06121a;
    font-weight: bold;
    cursor: pointer;
    font-size: 0.9rem;
    transition: filter 0.15s;
  }
  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  #status {
    font-size: 0.85rem;
    color: var(--sub);
    margin-bottom: 12px;
    min-height: 1.2em;
  }
  #status.error { color: var(--accent2); }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--panel);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  thead th {
    text-align: left;
    padding: 10px 12px;
    background: #2a2c46;
    font-size: 0.8rem;
    color: var(--sub);
    border-bottom: 1px solid var(--border);
  }
  tbody td {
    padding: 9px 12px;
    font-size: 0.85rem;
    border-bottom: 1px solid var(--border);
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(76, 201, 240, 0.07); }
  .verb-set { color: var(--accent); }
  .verb-create { color: #7bf1a8; }
  .verb-del { color: var(--accent2); }
  .mono { font-family: "Consolas", "Menlo", monospace; }
  .empty {
    text-align: center;
    padding: 30px;
    color: var(--sub);
  }
  .raw-toggle {
    margin: 14px 0 6px;
    font-size: 0.8rem;
    color: var(--sub);
    cursor: pointer;
    user-select: none;
  }
  .raw-toggle:hover { color: var(--accent); }
  pre#rawOutput {
    display: none;
    background: #11121f;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 0.75rem;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
</style>
</head>
<body>
<div class="container">
  <h1>☁ Scratch クラウド変数履歴ビューア</h1>
  <p class="desc">プロジェクトIDを入力すると、Scratchのクラウド変数ログ (clouddata.scratch.mit.edu) から取得した履歴を表示します。</p>

  <div class="controls">
    <div class="field">
      <label for="projectId">プロジェクトID</label>
      <input id="projectId" type="text" placeholder="例: 1332850073" inputmode="numeric">
    </div>
    <div class="field" style="max-width:100px;">
      <label for="limit">limit</label>
      <input id="limit" type="number" value="40" min="1" max="100">
    </div>
    <div class="field" style="max-width:100px;">
      <label for="offset">offset</label>
      <input id="offset" type="number" value="0" min="0">
    </div>
    <button id="fetchBtn">取得</button>
  </div>

  <div id="status"></div>

  <table id="resultTable" style="display:none;">
    <thead>
      <tr>
        <th>時刻</th>
        <th>ユーザー</th>
        <th>操作</th>
        <th>変数名</th>
        <th>値</th>
      </tr>
    </thead>
    <tbody id="resultBody"></tbody>
  </table>

  <div class="raw-toggle" id="rawToggle" style="display:none;">▸ 生のJSONを表示</div>
  <pre id="rawOutput"></pre>
</div>

<script>
const projectIdInput = document.getElementById('projectId');
const limitInput = document.getElementById('limit');
const offsetInput = document.getElementById('offset');
const fetchBtn = document.getElementById('fetchBtn');
const statusEl = document.getElementById('status');
const table = document.getElementById('resultTable');
const tbody = document.getElementById('resultBody');
const rawToggle = document.getElementById('rawToggle');
const rawOutput = document.getElementById('rawOutput');

let rawVisible = false;
rawToggle.addEventListener('click', () => {
  rawVisible = !rawVisible;
  rawOutput.style.display = rawVisible ? 'block' : 'none';
  rawToggle.textContent = (rawVisible ? '▾ 生のJSONを隠す' : '▸ 生のJSONを表示');
});

function verbClass(verb) {
  if (verb === 'set_var') return 'verb-set';
  if (verb === 'create_var') return 'verb-create';
  if (verb === 'del_var') return 'verb-del';
  return '';
}

function verbLabel(verb) {
  const map = {
    set_var: 'set',
    create_var: 'create',
    del_var: 'delete',
    rename_var: 'rename'
  };
  return map[verb] || verb;
}

function formatTimestamp(ts) {
  if (typeof ts !== 'number') return String(ts);
  const d = new Date(ts);
  if (isNaN(d.getTime())) return String(ts);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}.${String(d.getMilliseconds()).padStart(3,'0')}`;
}

const PROXY_TIMEOUT_MS = 6000;

function buildProxyList(targetUrl) {
  return [
    { name: 'allorigins.win', url: `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}` },
    { name: 'corsproxy.io', url: `https://corsproxy.io/?url=${encodeURIComponent(targetUrl)}` },
    { name: 'codetabs.com', url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}` },
  ];
}

function fetchWithTimeout(proxy, ms) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms);
  return fetch(proxy.url, { signal: controller.signal })
    .then(async res => {
      clearTimeout(timer);
      if (!res.ok) throw new Error(`HTTPエラー: ${res.status}`);
      const t = await res.text();
      if (!t || !t.trim().startsWith('[')) {
        throw new Error('予期しない形式のレスポンス');
      }
      return { text: t, proxyName: proxy.name };
    })
    .catch(err => {
      clearTimeout(timer);
      throw err;
    });
}

// プロジェクトID・limit・offsetを指定してログを取得するヘルパー
// allorigins.win を必ず最優先で使用し、失敗した場合のみ他のプロキシに順番にフォールバックする。
async function fetchCloudLogs(projectId, limit, offset) {
  const targetUrl = `https://clouddata.scratch.mit.edu/logs?projectid=${encodeURIComponent(projectId)}&limit=${encodeURIComponent(limit)}&offset=${encodeURIComponent(offset)}`;
  const proxies = buildProxyList(targetUrl); // 先頭が allorigins.win 固定

  let lastError = null;
  for (const proxy of proxies) {
    try {
      const { text, proxyName } = await fetchWithTimeout(proxy, PROXY_TIMEOUT_MS);
      let data;
      try {
        data = JSON.parse(text);
      } catch (e) {
        throw new Error('レスポンスをJSONとして解析できませんでした。');
      }
      return { data, text, proxyName };
    } catch (e) {
      lastError = e;
      // allorigins.win が失敗した場合のみ次のプロキシへフォールバック
    }
  }
  throw lastError || new Error('すべてのプロキシで取得に失敗しました');
}

async function fetchLogs() {
  const projectId = projectIdInput.value.trim();
  const limit = limitInput.value || 40;
  const offset = offsetInput.value || 0;

  if (!projectId) {
    statusEl.textContent = 'プロジェクトIDを入力してください。';
    statusEl.classList.add('error');
    return;
  }

  fetchBtn.disabled = true;
  statusEl.classList.remove('error');
  statusEl.textContent = '取得中...';
  table.style.display = 'none';
  rawToggle.style.display = 'none';
  tbody.innerHTML = '';

  let result = null;
  let lastError = null;

  try {
    result = await fetchCloudLogs(projectId, limit, offset);
  } catch (e) {
    lastError = e;
  }

  try {
    if (result === null) {
      throw lastError || new Error('すべての取得方法が失敗しました');
    }
    const { data, text, proxyName } = result;
    rawOutput.textContent = text;

    if (!Array.isArray(data) || data.length === 0) {
      statusEl.textContent = `データが見つかりませんでした（クラウド変数の履歴が無い、またはプロジェクトIDが間違っている可能性があります）。（経由: ${proxyName}）`;
      rawToggle.style.display = 'block';
      return;
    }

    data.forEach(entry => {
      const tr = document.createElement('tr');

      const tdTime = document.createElement('td');
      tdTime.className = 'mono';
      tdTime.textContent = formatTimestamp(entry.timestamp);

      const tdUser = document.createElement('td');
      tdUser.textContent = entry.user ?? '-';

      const tdVerb = document.createElement('td');
      tdVerb.className = verbClass(entry.verb);
      tdVerb.textContent = verbLabel(entry.verb);

      const tdName = document.createElement('td');
      tdName.className = 'mono';
      tdName.textContent = entry.name ?? '-';

      const tdValue = document.createElement('td');
      tdValue.className = 'mono';
      tdValue.textContent = (entry.value !== undefined) ? entry.value : '-';

      tr.append(tdTime, tdUser, tdVerb, tdName, tdValue);
      tbody.appendChild(tr);
    });

    table.style.display = 'table';
    rawToggle.style.display = 'block';
    statusEl.textContent = `${data.length} 件のログを取得しました。（経由: ${proxyName}）`;
  } catch (err) {
    statusEl.textContent = `エラー: ${err.message}（allorigins.win を含む全プロキシで取得できませんでした。プロジェクトIDが間違っている可能性もあります）`;
    statusEl.classList.add('error');
  } finally {
    fetchBtn.disabled = false;
  }
}

fetchBtn.addEventListener('click', fetchLogs);
projectIdInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchLogs();
});
</script>
</body>
</html>
